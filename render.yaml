services:
  - type: web
    name: rtlo-operations-map
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn refresh_server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60 --keep-alive 5 --preload
    healthCheckPath: /healthz
    envVars:
      - key: WORK_DIR
        value: /opt/render/project/src
      - key: CREW_FILE
        value: /tmp/crew_locations.json
      - key: MAP_HTML_FILE
        value: /tmp/map.html
      - key: CREW_API_KEY
        value: rtlo-crew-2026
      - key: JT_GRANT_KEY
        sync: false
      - key: JT_ORG_ID
        sync: false
      - key: GHL_PIT
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: MAPBOX_TOKEN
        sync: false
      - key: EMAIL_TO
        value: eruss@rtloaz.com
      - key: MAP_URL
        value: https://map.inhousekru.com
