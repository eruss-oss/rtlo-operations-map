name: Keep Render Awake

on:
  schedule:
    # Ping every 14 minutes around the clock to prevent Render free-tier sleep
    - cron: '0,14,28,42,56 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping map server health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://map.inhousekru.com/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS — may be waking up"
          fi
